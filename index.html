<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日本卡追蹤">
<meta name="theme-color" content="#fafaf7">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>日本刷卡追蹤</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23fafaf7'/><circle cx='90' cy='90' r='42' fill='%23C8102E'/></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23fafaf7'/><circle cx='32' cy='32' r='15' fill='%23C8102E'/></svg>">
<style>
:root {
  --bg: #fafaf7;
  --surface: #ffffff;
  --surface-2: #f3f2ed;
  --text: #1a1a1a;
  --text-2: #6b6b68;
  --text-3: #a3a39e;
  --border: rgba(26, 26, 26, 0.09);
  --accent: #C8102E;
  --info: #1f6feb;
  --warn: #b45309;
  --danger: #C8102E;
  --success: #2d8659;
  --radius: 12px;
  --radius-sm: 8px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141413;
    --surface: #1f1f1d;
    --surface-2: #2a2a27;
    --text: #f5f5f0;
    --text-2: #a8a8a2;
    --text-3: #6b6b68;
    --border: rgba(255, 255, 255, 0.1);
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

.app {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px 16px 80px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 8px 4px 18px;
}

header .title {
  font-size: 17px;
  font-weight: 500;
  margin: 0;
  letter-spacing: -0.01em;
}

header .subtitle {
  font-size: 12px;
  color: var(--text-2);
  margin: 3px 0 0;
}

.btn-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 0.5px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-2);
  transition: background 0.15s;
}

.btn-icon:active { background: var(--surface-2); }
.btn-icon svg { width: 18px; height: 18px; }

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
}

.card-flat {
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.label {
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.02em;
}

/* Card chips selector */
.card-chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px 4px 14px;
  margin: 0 -16px 4px;
  padding-left: 16px;
  padding-right: 16px;
  scrollbar-width: none;
}
.card-chips::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px;
  cursor: pointer;
  min-width: 130px;
  transition: border-color 0.15s, background 0.15s;
}

.chip.active {
  border-color: var(--text);
  background: var(--text);
  color: var(--bg);
}

.chip-name {
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 5px;
}

.chip-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.chip.active .chip-dot { background: var(--bg) !important; }

.chip-rate {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 3px;
  font-variant-numeric: tabular-nums;
}

.chip.active .chip-rate { color: rgba(255,255,255,0.7); }

.cap-card .top-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}

.cap-card .status {
  font-size: 12px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 100px;
  background: var(--surface);
  color: var(--text-2);
}

.cap-card .status.info { background: rgba(31, 111, 235, 0.12); color: var(--info); }
.cap-card .status.warn { background: rgba(180, 83, 9, 0.14); color: var(--warn); }
.cap-card .status.danger { background: rgba(200, 16, 46, 0.12); color: var(--danger); }
.cap-card .status.success { background: rgba(45, 134, 89, 0.14); color: var(--success); }

.cap-card .amount {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 4px;
}

.cap-card .num {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
}

.cap-card .denom {
  font-size: 13px;
  color: var(--text-2);
}

.progress-track {
  height: 7px;
  background: var(--surface);
  border-radius: 100px;
  overflow: hidden;
  margin-top: 12px;
}

.progress-fill {
  height: 100%;
  background: var(--info);
  border-radius: 100px;
  transition: width 0.4s ease, background 0.3s;
}

.progress-fill.warn { background: var(--warn); }
.progress-fill.danger { background: var(--danger); }

.hint {
  font-size: 13px;
  color: var(--text-2);
  margin: 12px 0 0;
  line-height: 1.5;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}

.stat-grid .stat-num {
  font-size: 22px;
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: -0.01em;
}

.stat-grid .stat-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}

.section-title {
  font-size: 14px;
  font-weight: 500;
  margin: 0 0 10px;
}

.field { margin-bottom: 12px; }

.field-label {
  display: block;
  font-size: 12px;
  color: var(--text-2);
  margin-bottom: 5px;
}

input[type="number"], input[type="text"] {
  width: 100%;
  height: 44px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 12px;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
  appearance: none;
}

input[type="number"]:focus, input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200, 16, 46, 0.1);
}

.field-jpy { position: relative; }

.field-jpy::before {
  content: "¥";
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-2);
  font-size: 16px;
  z-index: 1;
}

.field-jpy input { padding-left: 32px; font-size: 18px; }

.modifiers {
  margin-bottom: 12px;
}

.mod-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-top: 0.5px solid var(--border);
  cursor: pointer;
  user-select: none;
}

.mod-row:first-child { border-top: none; padding-top: 4px; }

.mod-row input {
  width: 20px;
  height: 20px;
  accent-color: var(--accent);
  margin: 1px 0 0;
  flex-shrink: 0;
}

.mod-body { flex: 1; min-width: 0; }

.mod-label {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.35;
}

.mod-hint {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
  line-height: 1.4;
}

.mod-row.capped-out .mod-label { color: var(--text-3); }

.info-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 0.5px solid var(--border);
  background: var(--surface-2);
  color: var(--text-2);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  margin-left: 6px;
  vertical-align: 1px;
  padding: 0;
  font-family: inherit;
  line-height: 1;
}

.info-btn:active { background: var(--text-2); color: var(--bg); }

.store-section {
  margin-bottom: 14px;
}

.store-section-title {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 500;
  margin: 0 0 6px;
  letter-spacing: 0.02em;
}

.store-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.store-tag {
  font-size: 13px;
  padding: 5px 10px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 100px;
  color: var(--text);
}

.preview-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 6px 0 14px;
  padding-top: 12px;
  border-top: 0.5px solid var(--border);
}

.modifiers:empty + .preview-row { border-top: none; padding-top: 0; }

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
}

.checkbox-label input {
  width: 20px;
  height: 20px;
  accent-color: var(--accent);
  margin: 0;
}

.preview {
  font-size: 14px;
  color: var(--text-2);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

button.primary {
  width: 100%;
  height: 48px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--text);
  color: var(--bg);
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}

button.primary:active {
  transform: scale(0.98);
  opacity: 0.85;
}

button.secondary {
  width: 100%;
  height: 44px;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  margin-top: 8px;
}

button.secondary.danger { color: var(--danger); border-color: rgba(200, 16, 46, 0.3); }
button.secondary:active { background: var(--surface-2); }

.note-box {
  font-size: 11px;
  color: var(--text-3);
  background: var(--surface-2);
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  margin: 0 0 12px;
  line-height: 1.5;
}

.tx-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 4px 0 12px;
  padding: 0 4px;
}

.tx-list {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 14px;
}

.tx-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
  gap: 12px;
}

.tx-row:last-child { border-bottom: none; }
.tx-row.no-bonus { opacity: 0.6; }

.tx-info { flex: 1; min-width: 0; }

.tx-main {
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tx-meta {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}

.tx-card-tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 100px;
  background: var(--surface-2);
  color: var(--text-2);
  margin-right: 4px;
  vertical-align: 1px;
}

.tx-delete {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.tx-delete:active { background: var(--surface-2); }
.tx-delete svg { width: 16px; height: 16px; }

.empty {
  font-size: 14px;
  color: var(--text-3);
  text-align: center;
  padding: 28px 0;
}

/* Card summary table */
.summary-list {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 14px;
  margin-bottom: 18px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 11px 0;
  border-bottom: 0.5px solid var(--border);
  gap: 8px;
}
.summary-row:last-child { border-bottom: none; }

.summary-name {
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.summary-cb {
  font-size: 14px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.summary-spent {
  font-size: 11px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
}

.modal.open { display: flex; }

.modal-content {
  background: var(--bg);
  width: 100%;
  max-width: 520px;
  border-radius: 20px 20px 0 0;
  padding: 22px 18px calc(22px + env(safe-area-inset-bottom));
  animation: slide-up 0.25s ease;
  max-height: 90vh;
  overflow-y: auto;
}

@keyframes slide-up {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-title {
  font-size: 17px;
  font-weight: 500;
  margin: 0 0 16px;
}

.rate-hint {
  font-size: 11px;
  color: var(--text-3);
  margin: 6px 0 0;
  line-height: 1.45;
}
</style>
</head>
<body>

<div class="app">

  <header>
    <div>
      <p class="title">日本刷卡追蹤</p>
      <p class="subtitle">2026 上半年 · 多卡回饋管理</p>
    </div>
    <button class="btn-icon" onclick="toggleSettings()" aria-label="設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <div class="card-chips" id="card-chips"></div>

  <div class="card-flat cap-card">
    <div class="top-row">
      <span class="label" id="cap-label">加碼額度已用</span>
      <span id="cap-status" class="status">尚未開始</span>
    </div>
    <div class="amount">
      <span id="cap-used" class="num">NT$0</span>
      <span id="cap-denom" class="denom">/ NT$15,000</span>
    </div>
    <div class="progress-track" id="progress-track"><div id="progress" class="progress-fill" style="width: 0%;"></div></div>
    <p id="hint" class="hint">新增第一筆消費開始追蹤</p>
  </div>

  <div class="stat-grid">
    <div class="card-flat" style="margin: 0;">
      <div class="label">本卡回饋</div>
      <div class="stat-num" id="card-cashback">0</div>
      <div class="stat-sub" id="card-spent">已刷 NT$0</div>
    </div>
    <div class="card-flat" style="margin: 0;">
      <div class="label">全部卡片合計</div>
      <div class="stat-num" id="total-cashback">0</div>
      <div class="stat-sub" id="total-spent">已刷 NT$0 · ¥0</div>
    </div>
  </div>

  <div class="card">
    <p class="section-title">新增消費</p>
    <div class="field field-jpy">
      <label class="field-label">日幣金額</label>
      <input type="number" id="jpy-input" placeholder="0" inputmode="decimal" />
    </div>
    <div class="field">
      <label class="field-label">備註(選填)</label>
      <input type="text" id="note-input" placeholder="例如:松本清、一蘭" />
    </div>
    <p class="note-box" id="card-note"></p>
    <div class="modifiers" id="modifiers-list"></div>
    <div class="preview-row">
      <span class="label">預估</span>
      <span id="preview-twd" class="preview">≈ NT$0</span>
    </div>
    <button class="primary" onclick="addTx()">新增到此卡</button>
  </div>

  <p class="section-title" style="margin: 18px 4px 10px;">各卡回饋總覽</p>
  <div class="summary-list" id="summary-list"></div>

  <div class="tx-header">
    <p class="section-title" style="margin: 0;">本卡消費紀錄</p>
    <span id="tx-count" style="font-size: 12px; color: var(--text-2);"></span>
  </div>
  <div class="tx-list" id="tx-list"></div>

</div>

<div class="modal" id="settings-modal" onclick="if(event.target===this)toggleSettings()">
  <div class="modal-content">
    <p class="modal-title">設定</p>
    <div class="field">
      <label class="field-label">JPY → TWD 匯率(1 ¥ = ? NT$)</label>
      <input type="number" id="fx-input" step="0.001" inputmode="decimal" />
      <p class="rate-hint">建議用實際刷卡匯率(現匯約 0.20,刷卡入帳約 0.21,VISA/Master 各家略異)</p>
    </div>
    <button class="primary" onclick="saveSettings()">儲存匯率</button>
    <button class="secondary" onclick="forceReload()">重新載入頁面(取得最新版)</button>
    <button class="secondary danger" onclick="resetCurrentCard()">清空目前卡片紀錄</button>
    <button class="secondary danger" onclick="resetAll()">重置全部(新帳單週期)</button>
    <button class="secondary" onclick="exportData()">匯出資料(JSON)</button>
    <button class="secondary" onclick="toggleSettings()">關閉</button>
  </div>
</div>

<div class="modal" id="stores-modal" onclick="if(event.target===this)closeStores()">
  <div class="modal-content">
    <p class="modal-title" id="stores-title">指定通路</p>
    <div id="stores-body"></div>
    <button class="secondary" onclick="closeStores()" style="margin-top:14px;">關閉</button>
  </div>
</div>

<script>
const KEY = 'jp_card_tracker_v3';

// 2026 H1 卡片設定
const CARDS = {
  dbs_eco: {
    name: '星展 eco',
    short: 'eco',
    color: '#C8102E',
    baseRate: 0.01,
    modifiers: [
      { key: 'overseas', label: '海外實體 / 行動支付 +4%', rateBonus: 0.04, capTwd: 15000, hint: '加碼 4% 每期上限 600 點(≈刷 NT$15,000)', default: true }
    ],
    note: '海外實體刷卡或 Apple/Samsung Pay 在指定國家可享 5%。'
  },
  dbs_eco_ez: {
    name: '星展 eco 極簡',
    short: 'eco極簡',
    color: '#FF8C42',
    baseRate: 0.01,
    modifiers: [
      { key: 'overseas', label: '海外實體 / 行動支付 +4%', rateBonus: 0.04, capTwd: 15000, hint: '加碼 4% 每期上限 600 點(≈刷 NT$15,000)', default: true }
    ],
    note: '海外實體刷卡或行動支付在指定國家可享 5%。'
  },
  ub_jiho: {
    name: '聯邦吉鶴',
    short: '吉鶴',
    color: '#E60012',
    baseRate: 0.025,
    modifiers: [
      { key: 'apple_pay', label: 'Apple Pay 加碼 +2.5%', rateBonus: 0.025, capTwd: null, hint: '前期帳單滿 NT$30,000 + Apple Pay 實體單筆 ≥ ¥100' },
      { key: 'designated', label: '指定通路 +3%', rateBonus: 0.03, capTwd: null, hint: '日本超商、量販、百貨、遊樂園等指定通路' },
      { key: 'new_customer', label: '新戶加碼 +3%', rateBonus: 0.03, capTwd: null, hint: '2026/1/1–6/30 新戶於日本實體店' }
    ],
    note: '日幣消費 2.5% 無上限為基礎,可疊加多種加碼最高 11%。'
  },
  esun_kumamon: {
    name: '玉山熊本熊',
    short: '熊本熊',
    color: '#1a1a1a',
    baseRate: 0.025,
    modifiers: [
      {
        key: 'designated',
        label: '指定店加碼 +6%',
        rateBonus: 0.06,
        capTwd: 8333,
        hint: '每期回饋上限 500 點(≈刷 NT$8,333),超過回到 2.5%',
        storeList: {
          '交通 / 租車 / 住宿': ['SUICA', 'PASMO', 'ICOCA', 'JR 鐵路', '日本航空', '樂天旅遊', '東橫 INN', '星野集團', 'TOYOTA Rent a Car', 'Times Car Rental', 'NIPPON RENT-A-CAR', 'OTS 租車', 'ORIX 租車'],
          '樂園 / 景點': ['東京迪士尼樂園', '東京華納兄弟哈利波特影城', '日本環球影城', '豪斯登堡', '九州非洲獅樂園', '名古屋樂高樂園', '吉伊卡哇樂園'],
          '美食 / 餐廳': ['一蘭拉麵', '鳥貴族', '勝烈亭', '敘敘苑', '牛角', '力丸', '六歌仙', 'Shake Shack', 'DOUTOR Coffee', 'Fuglen', '松屋', 'SUKIYA', '壽司郎', '藏壽司'],
          '購物 / 藥妝': ['BIC CAMERA', 'Yodobashi', '松本清', '唐吉軻德', '大國藥妝', '無印良品', '日本 MITSUI 購物園區', 'UNIQLO', 'GU']
        }
      }
    ],
    note: '日本一般 2.5% 無上限;指定店再加 +6%。'
  },
  taishin_richart: {
    name: '台新 Richart',
    short: 'Richart',
    color: '#E84A6D',
    baseRate: 0.033,
    modifiers: [],
    note: '切換「玩旅刷」方案,海外實體+線上 3.3% 無上限。'
  }
};

const CARD_ORDER = ['dbs_eco', 'dbs_eco_ez', 'ub_jiho', 'esun_kumamon', 'taishin_richart'];

let state = {
  transactions: [],
  fxRate: 0.21,
  activeCardId: 'dbs_eco',
  // Last-used modifier selections per card (persisted so user doesn't re-tick every time)
  selectedMods: {}
};

function getSelectedMods(cardId) {
  const card = CARDS[cardId];
  if (state.selectedMods[cardId]) {
    return state.selectedMods[cardId].filter(k => card.modifiers.some(m => m.key === k));
  }
  // Default: only mods marked default
  return card.modifiers.filter(m => m.default).map(m => m.key);
}

function setSelectedMods(cardId, mods) {
  state.selectedMods[cardId] = mods;
  saveState();
}

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      Object.assign(state, parsed);
    } else {
      // Migrate v2 → v3 (bonus boolean → mods array)
      const v2 = localStorage.getItem('jp_card_tracker_v2');
      if (v2) {
        const old = JSON.parse(v2);
        state.transactions = old.transactions || [];
        state.fxRate = old.fxRate || 0.21;
        state.activeCardId = old.activeCardId || 'dbs_eco';
      } else {
        // Migrate v1 (single-card legacy)
        const v1 = localStorage.getItem('dbs_eco_tracker_v1');
        if (v1) {
          const old = JSON.parse(v1);
          state.transactions = (old.transactions || []).map(t => ({ ...t, cardId: 'dbs_eco' }));
          state.fxRate = old.fxRate || 0.21;
        }
      }
    }
    // Normalize every tx
    state.transactions.forEach(tx => {
      if (!tx.cardId || !CARDS[tx.cardId]) tx.cardId = 'dbs_eco';
      if (!Array.isArray(tx.mods)) {
        // Migrate from old `bonus` boolean: if true, apply first modifier of card
        const card = CARDS[tx.cardId];
        if (tx.bonus && card.modifiers.length > 0) {
          tx.mods = [card.modifiers[0].key];
        } else {
          tx.mods = [];
        }
        delete tx.bonus;
      }
    });
  } catch (e) {}
  render();
}

function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
}

function computeCardStats(cardId) {
  const card = CARDS[cardId];
  const txs = state.transactions.filter(t => t.cardId === cardId);
  const usedByMod = {};   // mod key → twd consumed under that modifier
  card.modifiers.forEach(m => { usedByMod[m.key] = 0; });
  let totalSpent = 0;
  let totalJpy = 0;
  let cashback = 0;

  txs.forEach(tx => {
    totalSpent += tx.twd;
    totalJpy += tx.jpy;
    cashback += tx.twd * card.baseRate;
    (tx.mods || []).forEach(modKey => {
      const mod = card.modifiers.find(m => m.key === modKey);
      if (!mod) return;
      const used = usedByMod[modKey] || 0;
      const eligible = mod.capTwd != null
        ? Math.min(tx.twd, Math.max(0, mod.capTwd - used))
        : tx.twd;
      cashback += eligible * mod.rateBonus;
      usedByMod[modKey] = used + tx.twd;
    });
  });

  // Find the "primary" capped modifier for the cap-card progress display (first capped mod)
  const cappedMod = card.modifiers.find(m => m.capTwd != null);
  const primaryUsed = cappedMod ? Math.min(usedByMod[cappedMod.key] || 0, cappedMod.capTwd) : 0;
  const primaryRoomLeft = cappedMod ? Math.max(0, cappedMod.capTwd - (usedByMod[cappedMod.key] || 0)) : null;

  return {
    txs,
    cashback,
    totalSpent,
    totalJpy,
    usedByMod,
    cappedMod,
    primaryUsed,
    primaryRoomLeft
  };
}

function maxRate(card) {
  return card.baseRate + card.modifiers.reduce((s, m) => s + m.rateBonus, 0);
}

function renderChips() {
  const wrap = document.getElementById('card-chips');
  wrap.innerHTML = CARD_ORDER.map(id => {
    const c = CARDS[id];
    const s = computeCardStats(id);
    const max = maxRate(c);
    let rateText;
    if (s.cappedMod) {
      if (s.primaryRoomLeft > 0) {
        rateText = '至多 ' + +(max * 100).toFixed(2) + '% · 剩 NT$' + Math.round(s.primaryRoomLeft).toLocaleString();
      } else {
        rateText = (c.baseRate * 100) + '% (加碼用完)';
      }
    } else {
      rateText = '至多 ' + +(max * 100).toFixed(2) + '% 無上限';
    }
    const active = id === state.activeCardId ? ' active' : '';
    return '<div class="chip' + active + '" onclick="selectCard(\'' + id + '\')">' +
      '<div class="chip-name"><span class="chip-dot" style="background:' + c.color + '"></span>' + c.short + '</div>' +
      '<div class="chip-rate">' + rateText + '</div>' +
    '</div>';
  }).join('');
}

function selectCard(id) {
  state.activeCardId = id;
  saveState();
  render();
}

function render() {
  renderChips();

  const card = CARDS[state.activeCardId];
  const s = computeCardStats(state.activeCardId);

  // Cap card
  const capLabel = document.getElementById('cap-label');
  const capUsed = document.getElementById('cap-used');
  const capDenom = document.getElementById('cap-denom');
  const progress = document.getElementById('progress');
  const progressTrack = document.getElementById('progress-track');
  const statusEl = document.getElementById('cap-status');
  const hintEl = document.getElementById('hint');

  // Reset any inline background from previous render
  progress.style.background = '';

  if (s.cappedMod) {
    progressTrack.style.display = '';
    capLabel.textContent = s.cappedMod.label.replace(/\s*\+\d+(\.\d+)?%/, '') + ' 額度';
    capUsed.textContent = 'NT$' + Math.round(s.primaryUsed).toLocaleString();
    capDenom.textContent = '/ NT$' + s.cappedMod.capTwd.toLocaleString();
    const pct = Math.min(100, (s.primaryUsed / s.cappedMod.capTwd) * 100);
    progress.style.width = pct + '%';
    progress.className = 'progress-fill' + (pct >= 100 ? ' danger' : pct >= 80 ? ' warn' : '');

    const remaining = s.primaryRoomLeft;
    if (s.txs.length === 0) {
      statusEl.textContent = '尚未開始';
      statusEl.className = 'status';
      hintEl.textContent = '新增第一筆消費開始追蹤';
    } else if (remaining > 2000) {
      statusEl.textContent = '進行中';
      statusEl.className = 'status info';
      hintEl.textContent = '加碼還可刷 NT$' + Math.round(remaining).toLocaleString();
    } else if (remaining > 0) {
      statusEl.textContent = '快達上限';
      statusEl.className = 'status warn';
      hintEl.textContent = '注意!加碼只剩 NT$' + Math.round(remaining).toLocaleString() + ',刷完回到 ' + (card.baseRate * 100) + '% 基本回饋';
    } else {
      statusEl.textContent = '已達上限';
      statusEl.className = 'status danger';
      hintEl.textContent = '加碼已達上限,建議換其他卡繼續刷';
    }
  } else {
    // 無 capped modifier — 隱藏進度條,改顯示累積金額
    progressTrack.style.display = 'none';
    capLabel.textContent = '本卡日本累積';
    capUsed.textContent = 'NT$' + Math.round(s.totalSpent).toLocaleString();
    capDenom.textContent = '· 至多 ' + +(maxRate(card) * 100).toFixed(2) + '%';
    statusEl.textContent = s.txs.length === 0 ? '尚未開始' : '無上限';
    statusEl.className = 'status' + (s.txs.length === 0 ? '' : ' success');
    hintEl.textContent = s.txs.length === 0 ? '新增第一筆消費開始追蹤' : '此卡加碼無上限,持續刷享所選加碼';
  }

  // Card cashback / spent
  document.getElementById('card-cashback').textContent = Math.round(s.cashback).toLocaleString() + ' 點';
  document.getElementById('card-spent').textContent = '已刷 NT$' + Math.round(s.totalSpent).toLocaleString();

  // Total across all cards
  let totalCashback = 0, totalSpent = 0, totalJpy = 0;
  CARD_ORDER.forEach(id => {
    const cs = computeCardStats(id);
    totalCashback += cs.cashback;
    totalSpent += cs.totalSpent;
    totalJpy += cs.totalJpy;
  });
  document.getElementById('total-cashback').textContent = Math.round(totalCashback).toLocaleString() + ' 點';
  document.getElementById('total-spent').textContent = '已刷 NT$' + Math.round(totalSpent).toLocaleString() + ' · ¥' + Math.round(totalJpy).toLocaleString();

  // Note + modifier checkboxes
  document.getElementById('card-note').textContent = card.note;
  const modsEl = document.getElementById('modifiers-list');
  const selected = getSelectedMods(state.activeCardId);
  modsEl.innerHTML = card.modifiers.map(m => {
    const checked = selected.includes(m.key) ? 'checked' : '';
    const used = s.usedByMod[m.key] || 0;
    let tag = '';
    if (m.capTwd != null) {
      const left = Math.max(0, m.capTwd - used);
      tag = ' <span style="color:var(--text-3);">· 剩 NT$' + Math.round(left).toLocaleString() + '</span>';
    }
    const hint = m.hint ? '<div class="mod-hint">' + escapeHtml(m.hint) + tag + '</div>' : (tag ? '<div class="mod-hint">' + tag + '</div>' : '');
    const infoBtn = m.storeList
      ? '<button type="button" class="info-btn" onclick="event.preventDefault();event.stopPropagation();openStores(\'' + state.activeCardId + '\',\'' + m.key + '\')" aria-label="查看清單">i</button>'
      : '';
    return '<label class="mod-row">' +
      '<input type="checkbox" data-mod="' + m.key + '" ' + checked + ' onchange="onModChange()">' +
      '<div class="mod-body">' +
        '<div class="mod-label">' + escapeHtml(m.label) + infoBtn + '</div>' +
        hint +
      '</div>' +
    '</label>';
  }).join('');
  updatePreview();

  // Summary list
  const sumEl = document.getElementById('summary-list');
  sumEl.innerHTML = CARD_ORDER.map(id => {
    const c = CARDS[id];
    const cs = computeCardStats(id);
    const isActive = id === state.activeCardId;
    return '<div class="summary-row" onclick="selectCard(\'' + id + '\')" style="cursor:pointer;' + (isActive ? 'background:var(--surface-2);margin:0 -14px;padding-left:14px;padding-right:14px;border-radius:6px;' : '') + '">' +
      '<div>' +
        '<div class="summary-name"><span class="chip-dot" style="background:' + c.color + '"></span>' + c.name + '</div>' +
        '<div class="summary-spent">已刷 NT$' + Math.round(cs.totalSpent).toLocaleString() + ' · ' + cs.txs.length + ' 筆</div>' +
      '</div>' +
      '<div class="summary-cb">' + Math.round(cs.cashback).toLocaleString() + ' 點</div>' +
    '</div>';
  }).join('');

  // TX list (filter by active card)
  const listEl = document.getElementById('tx-list');
  const cardTxs = s.txs;
  document.getElementById('tx-count').textContent = cardTxs.length + ' 筆';
  if (cardTxs.length === 0) {
    listEl.innerHTML = '<p class="empty">尚無消費紀錄</p>';
  } else {
    listEl.innerHTML = cardTxs.slice().reverse().map(tx => {
      const note = tx.note ? ' · <span style="color: var(--text-2);">' + escapeHtml(tx.note) + '</span>' : '';
      const txMods = tx.mods || [];
      const hasMods = card.modifiers.length > 0;
      const noBonus = hasMods && txMods.length === 0;
      // Effective rate for this tx
      const effRate = card.baseRate + txMods.reduce((s, k) => {
        const m = card.modifiers.find(mm => mm.key === k);
        return s + (m ? m.rateBonus : 0);
      }, 0);
      const rateTag = ' · ' + +(effRate * 100).toFixed(2) + '%';
      const noBonusTag = noBonus ? ' · 無加碼' : '';
      return '<div class="tx-row' + (noBonus ? ' no-bonus' : '') + '">' +
        '<div class="tx-info">' +
          '<div class="tx-main">¥' + tx.jpy.toLocaleString() + note + '</div>' +
          '<div class="tx-meta">NT$' + Math.round(tx.twd).toLocaleString() + rateTag + noBonusTag + '</div>' +
        '</div>' +
        '<button class="tx-delete" onclick="removeTx(\'' + tx.id + '\')" aria-label="刪除">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>' +
        '</button>' +
      '</div>';
    }).join('');
  }

  document.getElementById('fx-input').value = state.fxRate;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function readCheckedMods() {
  return Array.from(document.querySelectorAll('#modifiers-list input[type=checkbox]'))
    .filter(el => el.checked)
    .map(el => el.dataset.mod);
}

function onModChange() {
  setSelectedMods(state.activeCardId, readCheckedMods());
  updatePreview();
}

function updatePreview() {
  const jpy = parseFloat(document.getElementById('jpy-input').value);
  const card = CARDS[state.activeCardId];
  const previewEl = document.getElementById('preview-twd');
  if (!jpy || jpy <= 0) {
    previewEl.textContent = '≈ NT$0';
    return;
  }
  const twd = jpy * state.fxRate;
  const s = computeCardStats(state.activeCardId);
  const checked = readCheckedMods();
  let cb = twd * card.baseRate;
  checked.forEach(modKey => {
    const mod = card.modifiers.find(m => m.key === modKey);
    if (!mod) return;
    const used = s.usedByMod[modKey] || 0;
    const eligible = mod.capTwd != null
      ? Math.min(twd, Math.max(0, mod.capTwd - used))
      : twd;
    cb += eligible * mod.rateBonus;
  });
  previewEl.textContent =
    '≈ NT$' + Math.round(twd).toLocaleString() + ' · 回饋 ' + Math.round(cb) + ' 點';
}

function addTx() {
  const jpyEl = document.getElementById('jpy-input');
  const noteEl = document.getElementById('note-input');
  const jpy = parseFloat(jpyEl.value);
  if (!jpy || jpy <= 0) { jpyEl.focus(); return; }

  const mods = readCheckedMods();
  setSelectedMods(state.activeCardId, mods);

  state.transactions.push({
    id: Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    cardId: state.activeCardId,
    jpy: jpy,
    twd: jpy * state.fxRate,
    mods: mods,
    note: noteEl.value.trim(),
    ts: Date.now()
  });
  jpyEl.value = '';
  noteEl.value = '';
  saveState();
  render();
  jpyEl.focus();
}

function removeTx(id) {
  state.transactions = state.transactions.filter(t => t.id !== id);
  saveState();
  render();
}

function toggleSettings() {
  document.getElementById('settings-modal').classList.toggle('open');
}

function openStores(cardId, modKey) {
  const card = CARDS[cardId];
  const mod = card && card.modifiers.find(m => m.key === modKey);
  if (!mod || !mod.storeList) return;
  document.getElementById('stores-title').textContent = card.name + ' · ' + mod.label.replace(/\s*\+\d+(\.\d+)?%/, '');
  const body = document.getElementById('stores-body');
  body.innerHTML = Object.entries(mod.storeList).map(([section, items]) =>
    '<div class="store-section">' +
      '<p class="store-section-title">' + escapeHtml(section) + '</p>' +
      '<div class="store-tags">' +
        items.map(it => '<span class="store-tag">' + escapeHtml(it) + '</span>').join('') +
      '</div>' +
    '</div>'
  ).join('') + '<p class="rate-hint">清單依玉山銀行官方公告為主,實際以結帳當下為準。</p>';
  document.getElementById('stores-modal').classList.add('open');
}

function closeStores() {
  document.getElementById('stores-modal').classList.remove('open');
}

function saveSettings() {
  const rate = parseFloat(document.getElementById('fx-input').value);
  if (rate && rate > 0) state.fxRate = rate;
  saveState();
  toggleSettings();
  render();
}

function resetCurrentCard() {
  const card = CARDS[state.activeCardId];
  if (!confirm('確定要清空「' + card.name + '」的所有消費紀錄?')) return;
  state.transactions = state.transactions.filter(t => t.cardId !== state.activeCardId);
  saveState();
  toggleSettings();
  render();
}

function resetAll() {
  if (!confirm('確定要清空所有卡片的消費紀錄?\n(用於新的帳單週期開始)')) return;
  state.transactions = [];
  saveState();
  toggleSettings();
  render();
}

function forceReload() {
  // 加 cache-busting query string 強制重抓
  const url = location.pathname + '?v=' + Date.now();
  location.replace(url);
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'jp_card_tracker_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('jpy-input').addEventListener('input', updatePreview);
document.getElementById('jpy-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTx();
});

loadState();
</script>
